<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Créer un compte — Aube Propreté Services</title>
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/espace-client.css" />
</head>
<body class="auth-body">

    <a href="../index.html" class="auth-retour">← Retour au site</a>

    <div class="auth-container">

        <div class="auth-logo">
            <span class="logo-icon">💧</span>
            <span class="auth-logo-text">Aube <strong>Propreté</strong> Services</span>
        </div>

        <div class="auth-card">
            <h1 class="auth-title">Créer mon compte</h1>
            <p class="auth-subtitle">Accédez à votre espace personnel</p>

            <div id="auth-message"></div>

            <form id="inscription-form" class="auth-form">

                <div class="form-row-2">
                    <div class="form-group">
                        <label>Prénom</label>
                        <input type="text" name="prenom" placeholder="Marie" required />
                    </div>
                    <div class="form-group">
                        <label>Nom</label>
                        <input type="text" name="nom" placeholder="Leroy" required />
                    </div>
                </div>

                <div class="form-group">
                    <label>Adresse email</label>
                    <input type="email" name="email" placeholder="marie@email.fr" required />
                </div>

                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" name="telephone" placeholder="06 12 34 56 78" />
                </div>

                <div class="form-group">
                    <label>Mot de passe</label>
                    <div class="input-password">
                        <input type="password" name="mot_de_passe" id="mdp" placeholder="Minimum 8 caractères" required />
                        <button type="button" id="toggle-mdp">👁️</button>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirmer le mot de passe</label>
                    <input type="password" name="confirmation" id="mdp-confirm" placeholder="Répétez le mot de passe" required />
                </div>

                <button type="submit" class="btn-auth">Créer mon compte</button>

            </form>

            <div class="auth-separator">
                <span>Déjà client ?</span>
            </div>

            <a href="login.html" class="btn-auth-outline">Se connecter</a>

        </div>
    </div>

    <script src="../js/inscription.js"></script>
</body>
</html>
