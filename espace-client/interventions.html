                <div class="dash-widget-header">
                    <span class="dash-widget-title">Toutes mes interventions</span>
                </div>
                <div class="dash-widget-body" id="toutes-interventions">
                    <p style="font-size:13px;color:#3a6a99;">Chargement...</p>
                </div>
            </div>
        </div>
    </main>
</div>
<script>
fetch('http://localhost/aube-proprete/php/get-dashboard.php')
.then(r => r.json())
.then(function(data) {
    if (!data.succes) { window.location.href = 'login.html'; return; }
    const zone = document.getElementById('toutes-interventions');
    if (data.interventions.length === 0) {
        zone.innerHTML = '<p style="font-size:13px;color:#3a6a99;">Aucune intervention. <a href="rdv.html">Prendre un RDV →</a></p>';
        return;
    }

    zone.innerHTML = data.interventions.map(function(i) {
        var date = new Date(i.date_intervention).toLocaleDateString('fr-FR', {weekday:'long',day:'numeric',month:'long',year:'numeric'});
        var badges = {'planifiee':'statut-planifiee','terminee':'statut-terminee','annulee':'statut-annulee','en_cours':'statut-en-attente'};
        var labels = {'planifiee':'Planifiée','terminee':'Terminée','annulee':'Annulée','en_cours':'En cours'};
        var etoiles = '';
        
        if (i.statut === 'terminee') {
            if (i.note_client) {
                etoiles = '<div style="font-size:12px;color:#f39c12;margin-top:6px;">' + '★'.repeat(i.note_client) + '☆'.repeat(5-i.note_client) + ' <span style="color:#3a6a99;font-size:11px;">Noté</span></div>';
            } else {
                etoiles = '<div style="margin-top:8px;" id="eval-' + i.id + '">'
                + '<p style="font-size:11px;color:#3a6a99;margin-bottom:4px;">Notez cette intervention :</p>'
                + [1,2,3,4,5].map(function(n) {
                    // Note : Claude a mis des étoiles pleines '★' dans son bouton pour cliquer dessus !
                    return '<button onclick="noterIntervention(' + i.id + ',' + n + ')" style="background:none;border:none;font-size:18px;cursor:pointer;padding:2px;">★</button>';
                }).join('')
                + '</div>';
            }
        }
        return '<div class="intervention-row" style="flex-direction:column;align-items:flex-start;">'
        + '<div style="display:flex;justify-content:space-between;align-items:center;width:100%;">'
        + '<div class="intervention-info">'
        + '<div class="intervention-type">' + i.type_service + '</div>'
        + '<div class="intervention-date">📅 ' + date + (i.heure ? ' · ' + i.heure : '') + (i.prix ? ' · ' + parseFloat(i.prix).toFixed(2) + '€' : '') + '</div>'
        + (i.note ? '<div style="font-size:11px;color:#5a8ab0;margin-top:3px;">📝 ' + i.note + '</div>' : '')
        + '</div>'
        + '<span class="statut-badge ' + (badges[i.statut]||'') + '">' + (labels[i.statut]||i.statut) + '</span>'
        + '</div>'
        + etoiles
        + '</div>';
    }).join('');
}); // Fin du fetch

// La fonction est maintenant globale, le bouton HTML peut l'appeler sans problème !
function noterIntervention(id, note) {
    var fd = new FormData();
    fd.append('action', 'noter');
    fd.append('intervention_id', id);
    fd.append('note', note);
    var xhr = new XMLHttpRequest();
    xhr.open('POST', 'http://localhost/aube-proprete/php/evaluation.php');
    xhr.onload = function() {
        var data = JSON.parse(xhr.responseText);
        var zone = document.getElementById('eval-' + id);
        if (zone) zone.innerHTML = '<div style="font-size:12px;color:#1a8a4a;margin-top:6px;">✅ ' + data.message + ' ' + '★'.repeat(note) + '</div>';
    };
    xhr.send(fd);
}
</script>
<script>
// Vérifier messages non lus
(function() {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', 'http://localhost/aube-proprete/php/messages.php?action=non_lus');
    xhr.onload = function() {
        try {
            var data = JSON.parse(xhr.responseText);
            if (data.succes && data.non_lus > 0) {
                var badge = document.getElementById('notif-msg');
                if (badge) { badge.textContent = data.non_lus; badge.style.display = 'inline'; }
            }
        } catch(e) {}
    };
    xhr.send();
})();
</script>
</body>
